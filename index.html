<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fast, lightweight currency converter..." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CurConv" />

    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://api.fxratesapi.com" />
    <link rel="preconnect" href="https://openexchangerates.org" />
    <title>CurConv – Currency Converter</title>
    <meta name="theme-color" content="#1a202c" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="assets/icon.png" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">CurConv</h1>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <svg
            class="sun-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            class="moon-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </header>

      <main class="converter-card">
        <!-- Amount -->
        <div class="input-group">
          <label for="amount" class="label">Amount</label>
          <input
            type="number"
            id="amount"
            class="amount-input"
            placeholder="0.00"
            min="0"
            step="0.01"
            value="100" />
          <div class="preset-chips" id="presetChips">
            <button class="chip" data-value="1">1</button>
            <button class="chip" data-value="100">100</button>
            <button class="chip" data-value="500">500</button>
            <button class="chip" data-value="1000">1000</button>
            <button class="chip" data-value="5000">5,000</button>
            <button class="chip" data-value="7000">7,000</button>
            <button class="chip" data-value="10000">10,000</button>
          </div>
        </div>

        <!-- Currency selectors -->
        <div class="currency-section">
          <div class="currency-group">
            <label for="fromCurrency" class="label">From</label>
            <div class="select-wrapper">
              <select id="fromCurrency" class="currency-select"></select>
            </div>
          </div>

          <button
            id="swapBtn"
            class="swap-btn"
            title="Swap currencies (Ctrl+S)"
            aria-label="Swap currencies">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0-12l4 4m-4-4l-4 4" />
            </svg>
          </button>

          <div class="currency-group">
            <label for="toCurrency" class="label">To</label>
            <div class="select-wrapper">
              <select id="toCurrency" class="currency-select"></select>
            </div>
          </div>
        </div>

        <!-- Convert -->
        <div class="action-group">
          <button id="convertBtn" class="convert-btn">Convert</button>
        </div>

        <!-- Result / Error / Loading -->
        <div id="result" class="result-section hidden">
          <span class="copy-hint">Click to copy</span>
          <div class="result-amount"></div>
          <div class="exchange-rate"></div>
          <div class="last-updated"></div>
          <div class="copied-toast" id="copiedToast">Copied!</div>
        </div>

        <div id="error" class="error-message hidden"></div>
        <div id="loading" class="loading hidden">
          <div class="spinner"></div>
          Loading…
        </div>
      </main>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((r) => console.log("SW registered:", r.scope))
            .catch((e) => console.log("SW failed:", e));
        });
      }
    </script>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
